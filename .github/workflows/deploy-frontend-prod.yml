name: Deploy Frontend (prod)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront (prod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_LS_APP_KEY: ${{ secrets.VITE_LS_APP_KEY }}
          VITE_LS_APP_SECRET: ${{ secrets.VITE_LS_APP_SECRET }}
          VITE_LS_OAUTH_URL: ${{ secrets.VITE_LS_OAUTH_URL }}
          VITE_LS_MARKET_DATA_URL: ${{ secrets.VITE_LS_MARKET_DATA_URL }}
          VITE_LS_INVESTINFO_URL: ${{ secrets.VITE_LS_INVESTINFO_URL }}
          VITE_LS_MAC_ADDRESS: ${{ secrets.VITE_LS_MAC_ADDRESS }}
          VITE_KIS_APP_KEY: ${{ secrets.VITE_KIS_APP_KEY }}
          VITE_KIS_APP_SECRET: ${{ secrets.VITE_KIS_APP_SECRET }}
          VITE_KIS_ACCESS_TOKEN: ${{ secrets.VITE_KIS_ACCESS_TOKEN }}
          VITE_DATA_GO_BASE_URL: ${{ secrets.VITE_DATA_GO_BASE_URL }}
          VITE_DATA_GO_SERVICE_KEY: ${{ secrets.VITE_DATA_GO_SERVICE_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
